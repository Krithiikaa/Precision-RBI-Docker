<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Precision-RBI · Sign in</title>
<style>
 body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
   background:#0f1115;color:#e6e8ec;font-family:system-ui,sans-serif}
 .card{background:#1a1d24;padding:32px;border-radius:14px;width:320px}
 h1{font-size:18px;margin:0 0 6px}.sub{color:#8b909a;font-size:13px;margin:0 0 18px}
 input{width:100%;padding:11px;margin:6px 0;border-radius:8px;border:1px solid #2a2e37;
   background:#12141a;color:#e6e8ec;box-sizing:border-box}
 button{width:100%;background:#4f8cff;color:#fff;border:0;padding:11px;border-radius:8px;
   cursor:pointer;margin-top:8px}.err{color:#ff6b6b;font-size:12px;min-height:16px}
</style></head><body>
<div class="card">
  <h1>Precision-RBI</h1>
  <p class="sub">Sign in once to enable secure browsing on this device.</p>
  <input id="u" placeholder="username" value="admin">
  <input id="p" type="password" placeholder="password" value="admin123">
  <button onclick="login()">Sign in</button>
  <p class="err" id="e"></p>
</div>
<script>
const params=new URLSearchParams(location.search);
async function login(){
  const r=await fetch('/portal/login',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u.value,password:p.value})});
  if(!r.ok){document.getElementById('e').textContent='Invalid credentials';return;}
  const next=params.get('next');
  document.getElementById('e').style.color='#6bffb0';
  document.getElementById('e').textContent='Device enabled. You can now browse normally.';
  if(next) setTimeout(()=>location.href=next,800);
}
</script></body></html>
